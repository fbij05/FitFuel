services:
  db:
    image: docker.io/mysql:8-debian
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fitfuel_db
      MYSQL_USER: fitfuel
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - "./.mysql:/var/lib/mysql"
    command: --default-authentication-plugin=mysql_native_password