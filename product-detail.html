<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <!-- Link to CSS file -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

<header>
    <div class="container top-nav">
        <a href="index.html" class="logo"><img src="img/logo.png" alt="Logo"></a>

        <form action="" class="search">
            <input type="search" placeholder="Search for products...">
            <button type="submit">Search</button>
        </form>

        <div class="cart_header">
            <!-- Cart icon that directs to checkout -->
            <div onclick="window.location.href='checkout.html'" class="icon_cart">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="count_item">0</span>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="product-detail-container container">
        <div class="product-detail">
            <div class="product-image">
                <img src="img/Proteína.jpg" alt="Product Image" />
            </div>

            <div class="product-info">
                <h1 class="product-name">Example Item</h1>
                <p class="product-description">
                    This is a detailed description of the product. It includes the benefits of using this product and other important information.
                </p>
                <p class="product-price">Price: $250</p>
                <p class="product-rating">Rating: 4.3</p>

                <!-- Button to add the product to the cart -->
                <button class="btn-add-to-cart">Add to Cart</button>
                
                <!-- Proceed to Checkout -->
                <div class="checkout-button-container">
                    <a href="checkout.html" class="btn_cart">Proceed to Checkout</a>
                </div>
            </div>
        </div>
    </div>

    
</main>

<script src="js/main.js"></script>
</body>
</html>
